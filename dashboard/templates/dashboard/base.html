{% load static %}
<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="utf-8">
        <meta name="referrer" content="strict-origin-when-cross-origin">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>{% block title %}EnvCa Weather Inventory{% endblock %}</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
        <link rel="stylesheet" href="{% static 'dashboard/css/style.css' %}">
        {% block extra_head %}{% endblock %}
    </head>

    <body class="d-flex flex-column min-vh-100">

        <nav class="navbar navbar-expand navbar-dark bg-dark">
            <div class="container-fluid">
                <a class="navbar-brand d-flex align-items-center gap-2" href="{% url 'dashboard:total_amount_of_station' %}">
                    <i class="bi bi-cloud-sun-fill"></i>
                    EnvCa Weather Inventory
                </a>
            </div>
        </nav>

        <main class="flex-grow-1 py-4">
            <div class="container">
                {% block content %}{% endblock %}
            </div>
        </main>

        <footer class="border-top py-3 mt-auto">
            <div class="container small text-muted d-flex justify-content-between">
                <span>Data provided by Environment and Climate Change Canada</span>
                <span>&copy; {% now "Y" %}</span>
            </div>
        </footer>

        {% block extra_scripts %}{% endblock %}
    </body>

</html>
