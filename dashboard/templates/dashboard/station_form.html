 {% load static %}

<!DOCTYPE html>

<html lang="en">

    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    </head>

    <body>

        <div class="container-fluid border py-3 my-3">
            <h3>{{ object.name }}</h3>
            {% if error %}
                <div class="alert alert-danger" role="alert">{{ error }}</div>
            {% endif %}
            <form method="get">
                <div class="row g-2 align-items-end mb-3">
                    <div class="col-sm-4">
                        <label for="date_beginning" class="form-label">Date beginning</label>
                        <input type="date" id="date_beginning" name="date_beginning" class="form-control" required>
                    </div>
                    <div class="col-sm-3">
                        <label for="date_end" class="form-label">Date end</label>
                        <input type="date" id="date_end" name="date_end" class="form-control" required>
                    </div>
                    <div class="col-sm-3">
                        <label for="freq" class="form-label">Frequency</label>
                        <select id="freq" name="freq" class="form-select">
                            <option value="hourly" {% if not available_freqs.hourly %}disabled{% endif %} {% if default_freq == "hourly" %}selected{% endif %}>Hourly</option>
                            <option value="daily" {% if not available_freqs.daily %}disabled{% endif %} {% if default_freq == "daily" %}selected{% endif %}>Daily</option>
                            <option value="monthly" {% if not available_freqs.monthly %}disabled{% endif %} {% if default_freq == "monthly" %}selected{% endif %}>Monthly</option>
                        </select>
                    </div>
                </div>
                <div class="col-sm-1">
                    <button type="submit" id="Submit" class="btn btn-outline-secondary btn-sm">Download</button>
                </div>
            </form>
        </div>
    </body>

</html>
