 {% load static %}

<!DOCTYPE html>

<html lang="en">

    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
            integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
            crossorigin=""/>

        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>
        
        <style>
            
            html, body {
                height: 100%;
                margin: 0;
            }
            .leaflet-container {
                height: 400px;
                width: 100%;
                max-width: 100%;
                max-height: 100%;
            }
            .station-popup-title {
                font-weight: bold;
                margin-bottom: 4px;
            }
            .station-popup table {
                border-collapse: collapse;
                font-size: 12px;
            }
            .station-popup th {
                text-align: right;
                padding-right: 6px;
                color: #555;
                font-weight: normal;
            }
            .station-popup td {
                text-align: left;
            }

        </style>

    </head>

    <body>
        <div class="container-fluid border py-3 my-3">
            <div class="row g-2 align-items-end mb-3">
                <div class="col-sm-4">
                    <label for="filter-name" class="form-label">Station name</label>
                    <input type="text" id="filter-name" class="form-control" placeholder="Search by name">
                </div>
                <div class="col-sm-3">
                    <label for="filter-year" class="form-label">Active in year</label>
                    <input type="number" id="filter-year" class="form-control" placeholder="e.g. 1990">
                </div>
                <div class="col-sm-4">
                    <label class="form-label d-block">Data availability</label>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="checkbox" id="filter-hourly">
                        <label class="form-check-label" for="filter-hourly">Hourly</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="checkbox" id="filter-daily">
                        <label class="form-check-label" for="filter-daily">Daily</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="checkbox" id="filter-monthly">
                        <label class="form-check-label" for="filter-monthly">Monthly</label>
                    </div>
                </div>
                <div class="col-sm-1">
                    <button type="button" id="filter-reset" class="btn btn-outline-secondary btn-sm">Reset</button>
                </div>
            </div>
            <div id="filter-count" class="small text-muted mb-2"></div>

            <div id="map"></div>

            {{ stations_json|json_script:"stations-data" }}
            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
            <script src="{% static 'dashboard/js/map.js' %}"></script>
        </div>
    </body>

</html>
